name: cyberlens
display_name: "CyberLens Website Security Scanner"
version: "1.0.0"
description: "Scan live websites for security headers, HTTPS issues, exposed technologies, insecure forms, and other web security risks with cloud or local analysis."
author: shadoprizm
license: Apache-2.0
tags: [security, scanner, website-security, appsec, https, headers]
capabilities:
  - web_scanning
  - security_analysis
tools:
  - connect_account
  - scan_website
  - get_security_score
  - explain_finding
  - list_scan_rules

config:
  api_key:
    type: string
    default: ""
    description: "CyberLens API key for cloud scanning (auto-set by connect_account)"
  api_base_url:
    type: string
    default: "https://phodfgfegbwkjhgsdyhc.supabase.co/functions/v1/public-api-scan"
    description: "CyberLens API base URL"
  timeout_seconds:
    type: integer
    default: 30
    description: "Request timeout for scan operations"
  max_redirects:
    type: integer
    default: 5
    description: "Maximum redirects to follow"
  user_agent:
    type: string
    default: "CyberLens-Skill/1.0.0"
    description: "User agent string for requests"
