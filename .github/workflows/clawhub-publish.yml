name: Publish to ClawHub

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/clawhub-publish.yml"
      - "skill.yaml"
      - "SKILL.md"
      - "README.md"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "src/**"
      - "tests/**"
      - "LICENSE"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

concurrency:
  group: clawhub-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Log in to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          test -n "$CLAWHUB_TOKEN"
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Publish updated skill
        run: clawhub sync --all --bump patch --changelog "Automated publish from GitHub Actions"
