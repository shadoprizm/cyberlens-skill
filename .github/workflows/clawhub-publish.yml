name: Publish to ClawHub

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/clawhub-publish.yml"
      - "skill.yaml"
      - "SKILL.md"
      - "README.md"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "src/**"
      - "tests/**"
      - "LICENSE"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
  workflow_dispatch:

concurrency:
  group: clawhub-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLAWHUB_SKILL_SLUG: cyberlens
      CLAWHUB_SKILL_NAME: CyberLens Security Scanner

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Log in to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          test -n "$CLAWHUB_TOKEN"
          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

      - name: Read skill version
        run: |
          version=$(sed -n 's/^version: "\(.*\)"/\1/p' skill.yaml)
          test -n "$version"
          echo "CLAWHUB_SKILL_VERSION=$version" >> "$GITHUB_ENV"

      - name: Publish updated skill
        run: >
          clawhub publish .
          --slug "$CLAWHUB_SKILL_SLUG"
          --name "$CLAWHUB_SKILL_NAME"
          --version "$CLAWHUB_SKILL_VERSION"
          --changelog "Automated publish from GitHub Actions"
